<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Desayunos — administración — Hotel Estar</title>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--font-body, system-ui, sans-serif); color: var(--ink, #2a2a28); background: var(--paper, #f6f3ec); -webkit-font-smoothing: antialiased; }
    .wrap { max-width: 760px; margin: 0 auto; padding: 20px 16px 48px; }

    .auth-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--paper, #f6f3ec); padding: 24px; z-index: 50; }
    .auth-card { background: var(--white, #fff); border: 1px solid var(--border, #e0dccf); border-radius: 16px; padding: 32px 24px; max-width: 360px; width: 100%; text-align: center; }
    .auth-card img { height: 40px; margin-bottom: 16px; }
    .auth-card h1 { font-size: 20px; margin: 0 0 8px; font-weight: 600; }
    .auth-card p { font-size: 14px; color: var(--fg-muted, #6b6660); margin: 0 0 20px; line-height: 1.5; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: 1px solid var(--ink, #2a2a28); background: var(--ink, #2a2a28); color: var(--white, #fff); border-radius: 12px; padding: 13px 20px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; }

    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border, #e0dccf); }
    .topbar .title { font-size: 15px; font-weight: 600; }
    .topbar .who { font-size: 12px; color: var(--fg-muted, #6b6660); }
    .topbar button { background: none; border: none; color: var(--fg-muted, #6b6660); font-size: 13px; cursor: pointer; text-decoration: underline; }

    .head-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 4px 0 18px; flex-wrap: wrap; }
    .head-row h1 { font-size: 20px; font-weight: 600; margin: 0; }
    .head-row input[type=month] { border: 1px solid var(--border, #cfc9bb); border-radius: 10px; padding: 8px 12px; font-size: 14px; font-family: inherit; background: var(--white, #fff); color: inherit; }

    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 18px; }
    .card { background: var(--white, #fff); border: 1px solid var(--border, #e0dccf); border-radius: 12px; padding: 14px 16px; }
    .card .label { font-size: 12px; color: var(--fg-muted, #6b6660); margin: 0 0 6px; }
    .card .value { font-size: 26px; font-weight: 700; margin: 0; }
    .card .value.accent { color: var(--olive-700, #4a5733); }
    .card .sub { font-size: 12px; color: var(--fg-muted, #9a9488); margin: 4px 0 0; }

    .panel { background: var(--white, #fff); border: 1px solid var(--border, #e0dccf); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
    .panel h2 { font-size: 14px; font-weight: 600; margin: 0 0 16px; }
    .bars { display: flex; align-items: flex-end; gap: 8px; height: 150px; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
    .bar-col .n { font-size: 11px; color: var(--fg-muted, #6b6660); }
    .bar-col .bar { width: 100%; background: var(--olive, #6b7d4f); border-radius: 4px 4px 0 0; min-height: 2px; }
    .bar-col .h { font-size: 11px; color: var(--fg-muted, #6b6660); }
    .daytable { width: 100%; border-collapse: collapse; font-size: 13px; }
    .daytable td { padding: 7px 0; border-bottom: 1px solid var(--border, #efe9db); }
    .daytable td:last-child { text-align: right; font-weight: 500; }
    .state { text-align: center; padding: 36px 16px; color: var(--fg-muted, #6b6660); font-size: 14px; }
    .err { color: var(--terracotta-700, #8a4226); }
  </style>
</head>
<body>

  <div id="authOverlay" class="auth-overlay">
    <div class="auth-card">
      <img src="assets/logo.png" alt="estar">
      <h1>Desayunos — administración</h1>
      <p>Acceso para el equipo de Hotel Estar. Inicia sesión con tu cuenta de Google autorizada.</p>
      <button id="loginBtn" class="btn" style="width:100%;">Iniciar sesión con Google</button>
      <p id="authError" class="err" style="display:none; font-size:13px; margin-top:16px;"></p>
    </div>
  </div>

  <div id="appContent" style="display:none;">
    <div class="topbar">
      <div>
        <div class="title">Desayunos — administración</div>
        <div class="who"><span id="userEmailDisplay"></span></div>
      </div>
      <button id="logoutBtn">Cerrar sesión</button>
    </div>
    <div class="wrap">
      <div class="head-row">
        <h1>Resumen del mes</h1>
        <input type="month" id="monthPicker">
      </div>
      <div id="dashboard"><div class="state">Cargando…</div></div>
    </div>
  </div>

  <script>
  (function () {
    function $(id) { return document.getElementById(id); }
    function fmt(n) { return Number(n || 0).toLocaleString('es-CO'); }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]; }); }
    function stateMsg(m, cls) { $('dashboard').innerHTML = '<div class="state ' + (cls || '') + '">' + esc(m) + '</div>'; }

    async function api(payload) {
      var headers = { 'Content-Type': 'application/json' };
      try { var t = await window.getAuthToken(); if (t) headers.Authorization = 'Bearer ' + t; } catch (e) {}
      var res = await fetch('/api/breakfast-analytics', { method: 'POST', headers: headers, body: JSON.stringify(payload || {}) });
      var data = {}; try { data = await res.json(); } catch (e) {}
      if (!res.ok) throw new Error(data.error || ('Error ' + res.status));
      return data;
    }

    function render(d) {
      var conv = (d.included + d.upgrades) > 0 ? Math.round(100 * d.upgrades / (d.included + d.upgrades)) : 0;
      var html = '';
      html += '<div class="cards">' +
        '<div class="card"><p class="label">Servidos</p><p class="value">' + fmt(d.served) + '</p><p class="sub">a liquidar al proveedor</p></div>' +
        '<div class="card"><p class="label">Upgrades vendidos</p><p class="value accent">$' + fmt(d.upgradeAmount) + '</p><p class="sub">' + fmt(d.upgrades) + ' desayuno(s)</p></div>' +
        '<div class="card"><p class="label">Incluidos</p><p class="value">' + fmt(d.included) + '</p><p class="sub">sin cobro extra</p></div>' +
        '<div class="card"><p class="label">Conversión upgrade</p><p class="value">' + conv + '%</p></div>' +
        '</div>';

      // Horarios (6 a 11)
      var hours = [6, 7, 8, 9, 10, 11];
      var max = 1;
      hours.forEach(function (h) { max = Math.max(max, d.byHour[h] || 0); });
      var bars = '';
      hours.forEach(function (h) {
        var v = d.byHour[h] || 0;
        var ht = Math.round((v / max) * 120);
        bars += '<div class="bar-col"><span class="n">' + v + '</span>' +
          '<div class="bar" style="height:' + ht + 'px;"></div>' +
          '<span class="h">' + h + ':00</span></div>';
      });
      html += '<div class="panel"><h2>Horarios de uso</h2><div class="bars">' + bars + '</div></div>';

      // Por día
      var days = Object.keys(d.byDay).sort();
      if (days.length) {
        var rows = days.map(function (day) { return '<tr><td>' + esc(day) + '</td><td>' + d.byDay[day] + '</td></tr>'; }).join('');
        html += '<div class="panel"><h2>Por día</h2><table class="daytable">' + rows + '</table></div>';
      } else {
        html += '<div class="panel"><div class="state">Sin desayunos servidos en el período.</div></div>';
      }

      $('dashboard').innerHTML = html;
    }

    function monthRange(ym) {
      // ym = 'YYYY-MM' → fromDate, toDate. Usa el último día REAL del mes (no '-31'
      // fijo, que en febrero/meses de 30 da una fecha inexistente).
      var parts = String(ym).split('-');
      var y = parseInt(parts[0], 10), m = parseInt(parts[1], 10);
      var lastDay = new Date(y, m, 0).getDate(); // día 0 del mes siguiente = último del actual
      return { fromDate: ym + '-01', toDate: ym + '-' + String(lastDay).padStart(2, '0') };
    }

    async function load() {
      var ym = $('monthPicker').value;
      stateMsg('Cargando…');
      try {
        var data = await api(ym ? monthRange(ym) : {});
        render(data);
      } catch (e) { stateMsg(e.message, 'err'); }
    }

    function init() {
      // Default al mes actual (en hora local del navegador, suficiente para el selector).
      var now = new Date();
      var ym = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
      $('monthPicker').value = ym;
      $('monthPicker').addEventListener('change', load);
      load();
    }
    window.__breakfastAdminInit = init;
  })();
  </script>

  <script type="module">
    var isLocal = ['localhost', '127.0.0.1', '0.0.0.0'].indexOf(location.hostname) !== -1;
    var $ = function (id) { return document.getElementById(id); };
    function showApp(email) { $('authOverlay').style.display = 'none'; $('appContent').style.display = 'block'; $('userEmailDisplay').textContent = email || ''; if (window.__breakfastAdminInit) window.__breakfastAdminInit(); }
    function showLogin(message) { $('authOverlay').style.display = 'flex'; $('appContent').style.display = 'none'; var e = $('authError'); if (message) { e.textContent = message; e.style.display = 'block'; } else { e.style.display = 'none'; } }

    if (isLocal) {
      window.getAuthToken = async function () { return ''; };
      showApp('demo@local');
    } else {
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js");
      const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } =
        await import("https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js");
      const app = initializeApp({
        apiKey: "AIzaSyAwgKBDAsDb51tZor9vFWo8AnOho5HFPyU",
        authDomain: "estar-4d0da.firebaseapp.com",
        projectId: "estar-4d0da",
        storageBucket: "estar-4d0da.firebasestorage.app",
        messagingSenderId: "625515728348",
        appId: "1:625515728348:web:a7cac6610f61e71018d319",
        measurementId: "G-9LHX50PT8E"
      });
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      window.getAuthToken = async function () { const u = auth.currentUser; if (!u) throw new Error('Sesión expirada. Inicia sesión de nuevo.'); return u.getIdToken(); };
      setPersistence(auth, browserLocalPersistence).catch(function () {});
      onAuthStateChanged(auth, function (u) { if (!u) showLogin(); else showApp(u.email); });
      $('loginBtn').addEventListener('click', async function () {
        $('authError').style.display = 'none';
        try { await signInWithPopup(auth, provider); }
        catch (err) { if (err && err.code === 'auth/popup-closed-by-user') return; showLogin('No se pudo iniciar sesión: ' + (err && err.message ? err.message : err)); }
      });
      $('logoutBtn').addEventListener('click', function () { signOut(auth); });
    }
  </script>
</body>
</html>
