[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  included_files = ["rooms_db.json"]
  node_bundler = "esbuild"
  # @sparticuz/chromium ships a ~50MB Brotli-compressed Chromium binary that
  # cannot be bundled by esbuild and must be loaded from node_modules at
  # runtime. puppeteer-core also expects its native dependencies to stay
  # external. Both are used by guest-drive to render the contract PDF.
  external_node_modules = [
    "@netlify/blobs",
    "@sparticuz/chromium",
    "googleapis",
    "puppeteer-core"
  ]

# Re-check room availability for active quotes a few times a day
[functions."revalidate-quotes"]
  schedule = "0 */6 * * *"

# Reconcile Wompi APPROVED transactions against processed-transactions blob
# to catch payments whose webhook never landed. Runs every 30 minutes.
[functions."reconcile-payments"]
  schedule = "*/30 * * * *"

[build.environment]
  NODE_VERSION = "20"
  # The Firebase web apiKey is public by design (it ships in client-side HTML);
  # security is enforced by Firebase authorized domains + the server-side
  # ADMIN_EMAILS allowlist. Exclude it from secret scanning.
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyAwgKBDAsDb51tZor9vFWo8AnOho5HFPyU"
  # These values are intentionally public/client-visible. Keep secret scanning
  # active for real secrets such as access tokens and webhook secrets.
  SECRETS_SCAN_OMIT_KEYS = "PAYMENT_PROVIDER,WOMPI_PUBLIC_KEY,MERCADOPAGO_PUBLIC_KEY"

# Configuration for Netlify deployment and serverless redirects
[[redirects]]
  from = "/en"
  to = "/en/"
  status = 301

[[redirects]]
  from = "/cotizar-admin"
  to = "/cotizar-admin.html"
  status = 301

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # NOTE: Content-Security-Policy is emitted by build.js into dist/_headers
    # so that inline <script> blocks can be allow-listed by SHA-256 hash and
    # `'unsafe-inline'` is no longer required on script-src.
    # See `writeCspHeaders` in build.js for the full directive.

[[headers]]
  for = "/cotizar-admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/cotizacion.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/guest.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Cache-Control = "no-store, no-cache, must-revalidate"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=(self)"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"
