[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  included_files = ["rooms_db.json"]
  node_bundler = "esbuild"
  external_node_modules = ["@netlify/blobs"]

# Re-check room availability for active quotes a few times a day
[functions."revalidate-quotes"]
  schedule = "0 */6 * * *"

# Reconcile Wompi APPROVED transactions against processed-transactions blob
# to catch payments whose webhook never landed. Runs every 30 minutes.
[functions."reconcile-payments"]
  schedule = "*/30 * * * *"

[build.environment]
  NODE_VERSION = "20"
  # The Firebase web apiKey is public by design (it ships in client-side HTML);
  # security is enforced by Firebase authorized domains + the server-side
  # ADMIN_EMAILS allowlist. Exclude it from secret scanning.
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyAwgKBDAsDb51tZor9vFWo8AnOho5HFPyU"
  # These values are intentionally public/client-visible. Keep secret scanning
  # active for real secrets such as access tokens and webhook secrets.
  SECRETS_SCAN_OMIT_KEYS = "PAYMENT_PROVIDER,WOMPI_PUBLIC_KEY,MERCADOPAGO_PUBLIC_KEY"

# Configuration for Netlify deployment and serverless redirects
[[redirects]]
  from = "/en"
  to = "/en/"
  status = 301

[[redirects]]
  from = "/cotizar-admin"
  to = "/cotizar-admin.html"
  status = 301

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Mercado Pago rollback: keep mercadopago.com.co/com + api.mercadopago.com allowed while Wompi is active.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://checkout.wompi.co https://www.googletagmanager.com https://www.gstatic.com https://apis.google.com https://www.mercadopago.com.co https://www.mercadopago.com; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; font-src 'self'; connect-src 'self' https://app.otasync.me https://production.wompi.co https://sandbox.wompi.co https://api.mercadopago.com https://api.resend.com https://www.google-analytics.com https://analytics.google.com https://stats.g.doubleclick.net https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://www.googleapis.com https://estar-4d0da.firebaseapp.com; frame-src https://checkout.wompi.co https://www.mercadopago.com.co https://www.mercadopago.com https://estar-4d0da.firebaseapp.com https://accounts.google.com https://apis.google.com; object-src 'none'; base-uri 'self'; form-action 'self' https://checkout.wompi.co https://www.mercadopago.com.co https://www.mercadopago.com; frame-ancestors 'self'; upgrade-insecure-requests"

[[headers]]
  for = "/cotizar-admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/cotizacion.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/guest.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Cache-Control = "no-store, no-cache, must-revalidate"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=(self)"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"
