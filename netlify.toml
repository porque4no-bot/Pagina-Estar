[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"
  # Deploys bajo control MANUAL para los previews (PR/ramas), automáticos para prod:
  #  - PRODUCCIÓN (merge a master): siempre construye (exit 1).
  #  - PREVIEW / rama: NO construye salvo que el mensaje del commit incluya la marca
  #    [deploy] o [preview]. Así los pushes normales no gastan minutos de Netlify y
  #    tú decides cuándo generar una previsualización (poniendo [deploy] en el commit).
  # Netlify: exit 0 = CANCELA el build · exit ≠0 = construye.
  ignore = "if [ \"$CONTEXT\" = production ]; then exit 1; fi; git log -1 --pretty=%B \"$COMMIT_REF\" | grep -qiE '\\[deploy\\]|\\[preview\\]' && exit 1; exit 0"

[functions]
  included_files = ["rooms_db.json", "docs/bot-conocimiento.md"]
  node_bundler = "esbuild"
  # Kept external (copied into the bundle instead of esbuild-bundled) because
  # of dynamic requires. NOTE: externals and their dependency trees are copied
  # into EVERY function zip — keep them small. The monolithic `googleapis`
  # (~200 MB unpacked) lived here and blew the 250 MB per-function limit; it
  # was replaced by the standalone @googleapis/drive (~2 MB).
  external_node_modules = [
    "@netlify/blobs",
    "@googleapis/drive",
    "pdfkit"
  ]

# Re-check room availability for active quotes a few times a day
[functions."revalidate-quotes"]
  schedule = "0 */6 * * *"

# Reconcile Wompi APPROVED transactions against processed-transactions blob
# to catch payments whose webhook never landed. Runs every 30 minutes.
[functions."reconcile-payments"]
  schedule = "*/30 * * * *"

# Data-retention purge (Ley 1581): delete guest PII older than 5 years.
# Runs daily at 03:30. See netlify/functions/purge-guest-data.js.
[functions."purge-guest-data"]
  schedule = "30 3 * * *"

# Pre-arrival + post-stay guest emails (A10). Reads OTASync reservations by
# date (read-only) and emails arrivals/departures. Gated by STAY_EMAILS_ENABLED
# (OFF by default). Runs daily at 12:00 UTC (07:00 Colombia).
[functions."send-stay-emails"]
  schedule = "0 12 * * *"

# Daily backup of durable Netlify Blobs (A4): quotes, refunds, breakfast,
# cancellations (+ opt-in encrypted PII). Snapshots to the isolated `backups`
# store and optionally Google Drive. Gated by BACKUP_ENABLED (OFF by default).
# Runs at 04:00 UTC (23:00 Colombia), apart from the purge cron.
[functions."backup-blobs"]
  schedule = "0 4 * * *"

[build.environment]
  NODE_VERSION = "22"
  # The Firebase web apiKey is public by design (it ships in client-side HTML);
  # security is enforced by Firebase authorized domains + the server-side
  # ADMIN_EMAILS allowlist. Exclude it from secret scanning.
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyAwgKBDAsDb51tZor9vFWo8AnOho5HFPyU"
  # These values are intentionally public/client-visible. Keep secret scanning
  # active for real secrets such as access tokens and webhook secrets.
  SECRETS_SCAN_OMIT_KEYS = "PAYMENT_PROVIDER,WOMPI_PUBLIC_KEY,MERCADOPAGO_PUBLIC_KEY"

# ─────────────────────────────────────────────────────────────────────────────
# Per-context payment credentials (documentation only)
#
# Real values are configured in the Netlify UI under Site settings →
# Environment variables, scoped by deploy context. NEVER hardcode keys here:
# this file is committed to git and any value placed below will leak.
#
# See docs/testing-production.md for a step-by-step setup and verification
# checklist, including where to obtain Wompi sandbox keys (sandbox.wompi.co)
# and Mercado Pago test credentials (mercadopago.com.co/developers).
#
# Production context (live keys, real money):
#   [context.production.environment]
#     PAYMENT_PROVIDER          = <set-in-netlify-ui>   # "wompi" (active) or "mercadopago" (rollback)
#     WOMPI_PUBLIC_KEY          = <set-in-netlify-ui>   # pub_prod_*  — from production.wompi.co
#     WOMPI_INTEGRITY_SECRET    = <set-in-netlify-ui>   # production integrity secret
#     WOMPI_WEBHOOK_SECRET      = <set-in-netlify-ui>   # production events secret
#     MERCADOPAGO_PUBLIC_KEY    = <set-in-netlify-ui>   # APP_USR-* (rollback only)
#     MERCADOPAGO_ACCESS_TOKEN  = <set-in-netlify-ui>   # APP_USR-* (rollback only)
#     MERCADOPAGO_WEBHOOK_SECRET= <set-in-netlify-ui>
#
# Deploy previews (every PR build — must use sandbox keys, no real money):
#   [context.deploy-preview.environment]
#     PAYMENT_PROVIDER          = <set-in-netlify-ui>   # match what you want to test
#     WOMPI_PUBLIC_KEY          = <set-in-netlify-ui>   # pub_test_*  — from sandbox.wompi.co
#     WOMPI_INTEGRITY_SECRET    = <set-in-netlify-ui>   # sandbox integrity secret
#     WOMPI_WEBHOOK_SECRET      = <set-in-netlify-ui>   # sandbox events secret
#     MERCADOPAGO_PUBLIC_KEY    = <set-in-netlify-ui>   # TEST-*
#     MERCADOPAGO_ACCESS_TOKEN  = <set-in-netlify-ui>   # TEST-*
#     MERCADOPAGO_WEBHOOK_SECRET= <set-in-netlify-ui>
#
# Branch deploys (any non-production branch — same sandbox keys as previews).
# Recommended: use a stable `staging` branch and register webhook URLs against
# its deploy URL so webhooks survive between PRs. See docs/testing-production.md.
#   [context.branch-deploy.environment]
#     # Mirror deploy-preview values above.
#
# The booking engine reads window.WOMPI_PUBLIC_KEY / window.MERCADOPAGO_PUBLIC_KEY
# and shows a "MODO PRUEBA / TEST MODE" banner on the payment step whenever the
# key prefix is sandbox (pub_test_ / TEST-). This banner is the visible signal
# that a build is wired to the sandbox.
# ─────────────────────────────────────────────────────────────────────────────

# Configuration for Netlify deployment and serverless redirects
[[redirects]]
  from = "/en"
  to = "/en/"
  status = 301

# Admin panel: clean access URL is now /admin (serves the quotes+refunds+breakfast
# panel via rewrite, URL stays /admin). Old paths redirect to it.
[[redirects]]
  from = "/admin"
  to = "/cotizar-admin.html"
  status = 200

[[redirects]]
  from = "/cotizar-admin"
  to = "/admin"
  status = 301

[[redirects]]
  from = "/desayuno"
  to = "/desayuno.html"
  status = 301

[[redirects]]
  from = "/pase-desayuno"
  to = "/pase-desayuno.html"
  status = 301

# Breakfast admin is now a tab inside /admin; the pretty URL points there.
# (desayuno-admin.html stays directly reachable — it's embedded by /admin.)
[[redirects]]
  from = "/desayuno-admin"
  to = "/admin"
  status = 301

# Portal Estar (empresas / residentes) — clean access URLs. The pages ship as
# portal.html / en/portal.html; these rewrites serve them at /portal and
# /en/portal without exposing the .html. Gated OFF at runtime (PORTAL_ENABLED);
# a disabled portal just renders its "próximamente" state.
[[redirects]]
  from = "/portal"
  to = "/portal.html"
  status = 200

[[redirects]]
  from = "/en/portal"
  to = "/en/portal.html"
  status = 200

# Portal Estar API (all gated OFF by their own flags — PORTAL_ENABLED /
# CREDIT_ENABLED / PAGARE_ESIGN_ENABLED / COLLECTIONS_ENABLED). These are
# reached through the generic /api/* rewrite below — no dedicated rule needed.
# Endpoints & backing functions (verified to exist):
#   /api/portal-session   → portal-session.js   (magic-link + Google session)
#   /api/portal-company   → portal-company.js   (empresa: cotizaciones/cartera/facturas/pedidos)
#   /api/portal-resident  → portal-resident.js  (residente: estado de cuenta + pedidos/PQR)
#   /api/credit-enroll    → credit-enroll.js    (solicitud de crédito, gated CREDIT_ENABLED)
#   /api/credit-decision  → credit-decision.js  (DECISIÓN HUMANA de crédito: credito.ver/credito.aprobar)
#   /api/pagare-sign      → pagare-sign.js       (firma de pagaré, gated PAGARE_ESIGN_ENABLED)
#   /api/collections-run  → collections-run.js   (gestión de cobranza, gated COLLECTIONS_ENABLED)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# English visitors who hit a broken/unknown /en/ route get the English 404
# (generated by build.js) instead of the Spanish root one. Non-forced: real
# /en/ files always win; this only fires when nothing matches.
[[redirects]]
  from = "/en/*"
  to = "/en/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # A-11: HSTS en un sitio con pagos/login admin/PII (evita SSL-stripping en el
    # primer request). Sin `preload` a propósito hasta validar HTTPS de subdominios.
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # NOTE: Content-Security-Policy is emitted by build.js into dist/_headers
    # so that inline <script> blocks can be allow-listed by SHA-256 hash and
    # `'unsafe-inline'` is no longer required on script-src.
    # See `writeCspHeaders` in build.js for the full directive.

[[headers]]
  for = "/admin"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    # A-11: no cachear PII del panel (bfcache podría re-mostrarla con "atrás" en un
    # equipo compartido de recepción).
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/cotizar-admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/cotizacion.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Cache-Control = "no-store, no-cache, must-revalidate"

# Guest-facing breakfast passes (opened via signed link; no login, no camera).
[[headers]]
  for = "/pase-desayuno.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/desayuno-admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/guest.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Cache-Control = "no-store, no-cache, must-revalidate"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=(self)"

# Breakfast staff panel: needs the camera for QR scanning; keep it out of search.
[[headers]]
  for = "/desayuno.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Cache-Control = "no-store, no-cache, must-revalidate"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=()"

# Refund bank-details form (A9): guest types account/ID numbers here.
# Keep it out of search and out of any cache.
[[headers]]
  for = "/datos-cuenta.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/en/datos-cuenta.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Cache-Control = "no-store, no-cache, must-revalidate"

# Portal Estar: serves client account data (cartera, facturas, crédito — PII
# financiera, Ley 1266/1581). Keep it out of search and out of any cache.
[[headers]]
  for = "/portal.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/en/portal.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/*.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"
