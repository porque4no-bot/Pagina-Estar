<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow, noarchive">
  <title>Control de aseo — Hotel Estar</title>
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-body, system-ui, sans-serif);
      color: var(--ink, #2a2a28);
      background: var(--paper, #f6f3ec);
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 560px; margin: 0 auto; padding: 16px; }

    /* Login overlay */
    .auth-overlay {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: var(--paper, #f6f3ec); padding: 24px; z-index: 50;
    }
    .auth-card {
      background: var(--white, #fff); border: 1px solid var(--border, #e0dccf);
      border-radius: 16px; padding: 32px 24px; max-width: 360px; width: 100%; text-align: center;
    }
    .auth-card img { height: 40px; margin-bottom: 16px; }
    .auth-card h1 { font-size: 20px; margin: 0 0 8px; font-weight: 600; }
    .auth-card p { font-size: 14px; color: var(--fg-muted, #6b6660); margin: 0 0 20px; line-height: 1.5; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      border: 1px solid var(--ink, #2a2a28); background: var(--ink, #2a2a28); color: var(--white, #fff);
      border-radius: 12px; padding: 14px 20px; font-size: 16px; font-weight: 500;
      cursor: pointer; width: 100%; font-family: inherit;
    }
    .btn:active { transform: scale(0.99); }
    .btn-ghost { background: transparent; color: var(--ink, #2a2a28); border-color: var(--border, #cfc9bb); }
    .btn[disabled] { opacity: .5; pointer-events: none; }

    /* Header */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border, #e0dccf); }
    .topbar .title { font-size: 15px; font-weight: 600; }
    .topbar .who { font-size: 12px; color: var(--fg-muted, #6b6660); }
    .topbar button { background: none; border: none; color: var(--fg-muted, #6b6660); font-size: 13px; cursor: pointer; text-decoration: underline; }

    .panel { background: var(--white, #fff); border: 1px solid var(--border, #e0dccf); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
    .panel h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: var(--fg-muted, #6b6660); margin: 0 0 12px; font-weight: 600; }
    .field label { display:block; font-size: 12px; color: var(--fg-muted, #6b6660); margin-bottom: 6px; }
    .field input {
      width: 100%; border: 1px solid var(--border, #cfc9bb); border-radius: 12px; padding: 13px 14px;
      font-size: 16px; font-family: inherit; background: var(--paper, #faf8f2); color: inherit;
    }
    .progress { font-size: 13px; color: var(--fg-muted, #6b6660); margin-top: 10px; }
    .progress b { color: var(--ink, #2a2a28); }

    /* Item cards */
    .item-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .item-label { font-size: 16px; font-weight: 600; }
    .hint { font-size: 12px; color: var(--fg-muted, #6b6660); margin: 6px 0 12px; line-height: 1.5; }
    .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
    .badge--todo { background: var(--sand-100, #efe7d6); color: var(--ink, #5a5446); }
    .badge--ok   { background: var(--olive-100, #e7ecd9); color: var(--olive-700, #4a5733); }
    .badge--warn { background: #f7eccf; color: #7a5a12; }
    .badge--no   { background: var(--terracotta-100, #f6ddd0); color: var(--terracotta-700, #8a4226); }
    .filelbl { margin-bottom: 10px; }
    .preview { width: 100%; border-radius: 12px; margin-bottom: 10px; display: block; background: #000; }
    .auditbtn { margin-bottom: 8px; }

    .verdict:empty { display: none; }
    .vbox { border-radius: 12px; padding: 14px; border: 1px solid var(--border, #e0dccf); }
    .vbox .vhead { display: flex; align-items: center; gap: 8px; font-weight: 600; margin-bottom: 6px; }
    .vbox--ok   { background: var(--olive-100, #e7ecd9); color: var(--olive-700, #4a5733); border-color: transparent; }
    .vbox--warn { background: #f7eccf; color: #7a5a12; border-color: transparent; }
    .vbox--no   { background: var(--terracotta-100, #f6ddd0); color: var(--terracotta-700, #8a4226); border-color: transparent; }
    .vbox ul { margin: 6px 0 0; padding-left: 18px; font-size: 13px; line-height: 1.5; }
    .vbox .sug { font-size: 13px; margin-top: 8px; font-style: italic; }
    .icon { width: 20px; height: 20px; flex: none; }

    .toast {
      position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
      background: var(--ink, #2a2a28); color: #fff; padding: 12px 18px; border-radius: 12px;
      font-size: 14px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 60; max-width: 90%;
    }
    .toast.show { opacity: 1; }
    .err { color: var(--terracotta-700, #8a4226); font-size: 13px; margin-top: 10px; }
    .demo-tag { display:inline-block; background: var(--sand-100, #efe7d6); color: var(--ink,#5a5446); font-size: 11px; padding: 2px 8px; border-radius: 8px; margin-left: 6px; }
    .mock-note { font-size: 11px; color: var(--fg-muted, #6b6660); margin-top: 6px; }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="authOverlay" class="auth-overlay">
    <div class="auth-card">
      <img src="assets/logo.png" alt="estar">
      <h1>Control de aseo</h1>
      <p>Acceso para el personal de aseo. Inicia sesión con tu cuenta de Google autorizada.</p>
      <button id="loginBtn" class="btn">Iniciar sesión con Google</button>
      <p id="authError" class="err" style="display:none;"></p>
    </div>
  </div>

  <!-- App -->
  <div id="appContent" style="display:none;">
    <div class="topbar">
      <div>
        <div class="title">Control de aseo</div>
        <div class="who"><span id="userEmailDisplay"></span><span id="demoTag" class="demo-tag" style="display:none;">demo</span></div>
      </div>
      <button id="logoutBtn">Cerrar sesión</button>
    </div>

    <div class="wrap">
      <div class="panel">
        <h2>Apartamento</h2>
        <div class="field">
          <label for="apartment">Identifícalo (ej. 101, Clásica 2)</label>
          <input id="apartment" type="text" inputmode="text" autocapitalize="characters"
                 placeholder="Apartamento" autocomplete="off">
        </div>
        <div class="progress" id="progress"></div>
        <div class="mock-note" id="mockNote" style="display:none;">Modo de prueba: la IA no está configurada, todas las fotos se aprueban.</div>
      </div>

      <div id="items"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
  /* Panel de control de aseo. La auth (token de Firebase) la resuelve el módulo
     de abajo, que expone window.getAuthToken(). La foto se comprime en el
     navegador antes de subirla y la audita la IA en el backend. */
  (function () {
    var items = [];        // [{id,label,hint}]
    var state = {};        // apartment -> item id -> { image, decision, result }

    function $(id) { return document.getElementById(id); }

    function toast(msg) {
      var t = $('toast'); t.textContent = msg; t.classList.add('show');
      setTimeout(function () { t.classList.remove('show'); }, 2400);
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    async function api(path, payload, method) {
      var headers = { 'Content-Type': 'application/json' };
      try {
        var token = await window.getAuthToken();
        if (token) headers.Authorization = 'Bearer ' + token;
      } catch (e) { /* sin token: en local el backend lo permite en modo demo */ }
      var opts = { method: method || 'POST', headers: headers };
      if (opts.method !== 'GET') opts.body = JSON.stringify(payload || {});
      var res = await fetch('/api/' + path, opts);
      var data = {};
      try { data = await res.json(); } catch (e) { /* respuesta no-JSON */ }
      if (!res.ok) throw new Error(data.error || ('Error ' + res.status));
      return data;
    }

    /* Comprime una imagen a JPEG (máx. 1280px lado mayor) para subirla liviana. */
    function compress(file) {
      return new Promise(function (resolve, reject) {
        var url = URL.createObjectURL(file);
        var img = new Image();
        img.onload = function () {
          URL.revokeObjectURL(url);
          var maxDim = 1280;
          var w = img.naturalWidth, h = img.naturalHeight;
          var scale = Math.min(1, maxDim / Math.max(w, h));
          var cw = Math.round(w * scale), ch = Math.round(h * scale);
          var canvas = document.createElement('canvas');
          canvas.width = cw; canvas.height = ch;
          canvas.getContext('2d').drawImage(img, 0, 0, cw, ch);
          try { resolve(canvas.toDataURL('image/jpeg', 0.72)); }
          catch (e) { reject(e); }
        };
        img.onerror = function () { URL.revokeObjectURL(url); reject(new Error('No se pudo leer la imagen.')); };
        img.src = url;
      });
    }

    var ICON_OK = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M8 12l3 3 5-5"/></svg>';
    var ICON_WARN = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l9 16H3z"/><path d="M12 10v4M12 17v.5"/></svg>';
    var ICON_NO = '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/></svg>';

    function setBadge(id, decision) {
      var b = document.querySelector('.item[data-item="' + id + '"] [data-badge]');
      if (!b) return;
      if (decision === 'aprobada') { b.className = 'badge badge--ok'; b.textContent = 'Aprobada'; }
      else if (decision === 'advertida') { b.className = 'badge badge--warn'; b.textContent = 'Con observación'; }
      else if (decision === 'rechazada') { b.className = 'badge badge--no'; b.textContent = 'Rechazada'; }
      else { b.className = 'badge badge--todo'; b.textContent = 'Pendiente'; }
    }

    function apartmentKey() {
      return $('apartment').value.trim();
    }

    function stateForApartment(key, create) {
      if (!key) return {};
      if (create && !state[key]) state[key] = {};
      return state[key] || {};
    }

    function apartmentState(create) {
      return stateForApartment(apartmentKey(), create);
    }

    function renderVerdict(id, res) {
      var el = document.querySelector('.item[data-item="' + id + '"] .verdict');
      if (!el) return;
      var v = res.verdict || {};
      var problemas = (v.problemas || []).map(function (p) { return '<li>' + escapeHtml(p) + '</li>'; }).join('');
      var sug = v.sugerencia ? '<div class="sug">' + escapeHtml(v.sugerencia) + '</div>' : '';

      if (res.decision === 'aprobada') {
        el.innerHTML = '<div class="vbox vbox--ok"><div class="vhead">' + ICON_OK + 'Aprobada</div>' +
          '<div style="font-size:13px;">Foto registrada correctamente.</div></div>';
      } else if (res.decision === 'advertida') {
        el.innerHTML = '<div class="vbox vbox--warn"><div class="vhead">' + ICON_WARN + 'Registrada con observaciones</div>' +
          (problemas ? '<ul>' + problemas + '</ul>' : '') + sug +
          '<div style="font-size:12px;margin-top:8px;">Se registró igual. Corrige si puedes y vuelve a tomar la foto para actualizarla.</div></div>';
      } else { /* rechazada */
        el.innerHTML = '<div class="vbox vbox--no"><div class="vhead">' + ICON_NO + 'Rechazada — repite la foto</div>' +
          (problemas ? '<ul>' + problemas + '</ul>' : '') + sug + '</div>';
      }
    }

    function updateProgress() {
      var total = items.length;
      var registradas = 0, obs = 0;
      var current = apartmentState(false);
      items.forEach(function (it) {
        var d = current[it.id] && current[it.id].decision;
        if (d === 'aprobada' || d === 'advertida') registradas++;
        if (d === 'advertida') obs++;
      });
      var msg = '<b>' + registradas + '</b> de ' + total + ' registradas';
      if (obs) msg += ' · ' + obs + ' con observación';
      $('progress').innerHTML = msg;
    }

    function syncCards() {
      var current = apartmentState(false);
      items.forEach(function (it) {
        var st = current[it.id];
        var card = document.querySelector('.item[data-item="' + it.id + '"]');
        if (!card) return;
        var preview = card.querySelector('.preview');
        var auditBtn = card.querySelector('.auditbtn');
        var verdict = card.querySelector('.verdict');
        setBadge(it.id, st && st.decision);
        if (st && st.image) {
          preview.src = st.image; preview.hidden = false;
          auditBtn.hidden = false;
        } else {
          preview.removeAttribute('src'); preview.hidden = true;
          auditBtn.hidden = true;
        }
        if (st && st.result) renderVerdict(it.id, st.result);
        else verdict.innerHTML = '';
      });
      updateProgress();
    }

    async function audit(id) {
      var apt = apartmentKey();
      if (!apt) { toast('Escribe el apartamento primero.'); $('apartment').focus(); return; }
      var st = stateForApartment(apt, false)[id];
      if (!st || !st.image) { toast('Toma la foto primero.'); return; }

      var card = document.querySelector('.item[data-item="' + id + '"]');
      var btn = card.querySelector('.auditbtn');
      btn.disabled = true; btn.textContent = 'Auditando…';
      try {
        var res = await api('validate-cleaning-photo', { apartment: apt, item: id, image: st.image });
        st.decision = res.decision;
        st.result = res;
        if (apartmentKey() === apt) {
          setBadge(id, res.decision);
          renderVerdict(id, res);
          updateProgress();
        } else {
          syncCards();
        }
        if (res.decision === 'aprobada') toast('Aprobada ✓');
        else if (res.decision === 'advertida') toast('Registrada con observaciones');
        else toast('Rechazada — repite la foto');
      } catch (e) {
        if (apartmentKey() === apt) {
          card.querySelector('.verdict').innerHTML = '<p class="err" style="margin:0;">' + escapeHtml(e.message) + '</p>';
        } else {
          syncCards();
        }
      } finally {
        btn.disabled = false; btn.textContent = 'Auditar foto';
      }
    }

    function itemCard(it) {
      return '<div class="panel item" data-item="' + escapeHtml(it.id) + '">' +
        '<div class="item-head"><span class="item-label">' + escapeHtml(it.label) + '</span>' +
        '<span class="badge badge--todo" data-badge>Pendiente</span></div>' +
        '<p class="hint">' + escapeHtml(it.hint || '') + '</p>' +
        '<label class="btn btn-ghost filelbl">Tomar foto' +
          '<input type="file" accept="image/*" capture="environment" hidden></label>' +
        '<img class="preview" alt="" hidden>' +
        '<button class="btn auditbtn" hidden>Auditar foto</button>' +
        '<div class="verdict"></div>' +
      '</div>';
    }

    function wireCard(it) {
      var card = document.querySelector('.item[data-item="' + it.id + '"]');
      var input = card.querySelector('input[type="file"]');
      var preview = card.querySelector('.preview');
      var auditBtn = card.querySelector('.auditbtn');

      input.addEventListener('change', async function () {
        var file = input.files && input.files[0];
        var apt = apartmentKey();
        if (!file) return;
        if (!apt) {
          toast('Escribe el apartamento primero.');
          $('apartment').focus();
          input.value = '';
          return;
        }
        try {
          var dataUrl = await compress(file);
          stateForApartment(apt, true)[it.id] = { image: dataUrl };
          if (apartmentKey() === apt) {
            preview.src = dataUrl; preview.hidden = false;
            auditBtn.hidden = false;
            card.querySelector('.verdict').innerHTML = '';
            setBadge(it.id, null);
            updateProgress();
          } else {
            syncCards();
          }
        } catch (e) { toast('No se pudo procesar la imagen.'); }
      });

      auditBtn.addEventListener('click', function () { audit(it.id); });
    }

    async function init() {
      try {
        var data = await api('cleaning-checklist', null, 'GET');
        items = data.items || [];
        if (data.aiEnabled === false) $('mockNote').style.display = 'block';
      } catch (e) {
        $('items').innerHTML = '<div class="panel"><p class="err" style="margin:0;">No se pudo cargar la lista: ' + escapeHtml(e.message) + '</p></div>';
        return;
      }
      $('items').innerHTML = items.map(itemCard).join('');
      items.forEach(wireCard);
      $('apartment').addEventListener('input', syncCards);
      updateProgress();
    }

    window.__aseoPanelInit = init;   // el módulo de auth lo llama al mostrar la app
  })();
  </script>

  <!-- ── Firebase Google auth (mismo patrón que desayuno.html) ── -->
  <script type="module">
    var isLocal = ['localhost', '127.0.0.1', '0.0.0.0'].indexOf(location.hostname) !== -1;
    var $ = function (id) { return document.getElementById(id); };

    function showApp(email, demo) {
      $('authOverlay').style.display = 'none';
      $('appContent').style.display = 'block';
      $('userEmailDisplay').textContent = email || '';
      if (demo) $('demoTag').style.display = 'inline-block';
      if (window.__aseoPanelInit) window.__aseoPanelInit();
    }
    function showLogin(message) {
      $('authOverlay').style.display = 'flex';
      $('appContent').style.display = 'none';
      var err = $('authError');
      if (message) { err.textContent = message; err.style.display = 'block'; } else { err.style.display = 'none'; }
    }

    if (isLocal) {
      window.getAuthToken = async function () { return ''; };
      showApp('demo@local', true);
    } else {
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js");
      const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } =
        await import("https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js");

      const firebaseConfig = {
        apiKey: "AIzaSyAwgKBDAsDb51tZor9vFWo8AnOho5HFPyU",
        authDomain: "estar-4d0da.firebaseapp.com",
        projectId: "estar-4d0da",
        storageBucket: "estar-4d0da.firebasestorage.app",
        messagingSenderId: "625515728348",
        appId: "1:625515728348:web:a7cac6610f61e71018d319",
        measurementId: "G-9LHX50PT8E"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const provider = new GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });

      window.getAuthToken = async function () {
        const user = auth.currentUser;
        if (!user) throw new Error('Sesión expirada. Inicia sesión de nuevo.');
        return user.getIdToken();
      };

      setPersistence(auth, browserLocalPersistence).catch(function () {});
      onAuthStateChanged(auth, function (user) { if (!user) { showLogin(); } else { showApp(user.email, false); } });

      $('loginBtn').addEventListener('click', async function () {
        $('authError').style.display = 'none';
        try { await signInWithPopup(auth, provider); }
        catch (err) {
          if (err && err.code === 'auth/popup-closed-by-user') return;
          showLogin('No se pudo iniciar sesión: ' + (err && err.message ? err.message : err));
        }
      });
      $('logoutBtn').addEventListener('click', function () { signOut(auth); });
    }
  </script>
</body>
</html>
